<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quranic Recitation Player</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Quran Player">
    <link rel="apple-touch-icon" href="quran-icon.png">
    <style>
        :root {
            --primary-color: #1d3557;
            --secondary-color: #457b9d;
            --accent-color: #a8dadc;
            --background-color: #f1faee;
            --surface-color: #ffffff;
            --danger-color: #e63946;
            --muted-color: #6c757d;
            --text-color: #1f2933;
            --border-radius: 12px;
            --shadow-soft: 0 10px 30px rgba(15, 23, 42, 0.15);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, -webkit-system-font, sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.15) 0, transparent 40%), radial-gradient(circle at 80% 80%, rgba(16, 185, 129, 0.12) 0, transparent 45%);
            color: #e5e7eb;
            min-height: 100vh;
            padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
        }

        .app-container {
            max-width: 980px;
            margin: 0 auto;
            background: radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 55%), #020617;
            border-radius: 24px;
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(148,163,184,0.25);
            padding: 18px;
            position: relative;
            overflow: hidden;
        }

        .app-inner { position: relative; z-index: 1; }

        header {
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(148,163,184,0.35);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .title-group { display: flex; align-items: center; gap: 10px; }

        .app-icon {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: radial-gradient(circle at 30% 30%, #22c55e, #065f46);
            display: flex; align-items: center; justify-content: center;
            color: #ecfdf5; font-size: 20px;
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.5);
            border: 1px solid rgba(16, 185, 129, 0.4);
        }

        h1 { font-size: 20px; margin: 0; color: #e5e7eb; letter-spacing: 0.02em; }
        .subtitle { margin: 2px 0 0; font-size: 12px; color: #9ca3af; }

        .tabs {
            display: flex; margin-bottom: 16px; padding: 3px;
            background-color: rgba(15,23,42,0.9);
            border-radius: 999px; border: 1px solid rgba(31,41,55,0.9);
        }

        .tab {
            flex: 1; padding: 10px 8px; text-align: center; border-radius: 999px;
            cursor: pointer; font-size: 13px; font-weight: 500; color: #9ca3af;
            border: none; background: transparent;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            transition: all 0.17s ease;
        }

        .tab.active {
            background: radial-gradient(circle at 20% 0, rgba(59,130,246,0.45), rgba(37,99,235,0.95));
            color: #f9fafb;
            box-shadow: 0 7px 18px rgba(37,99,235,0.55);
        }

        .tab-content {
            display: none; border-radius: 18px;
            background-color: rgba(15,23,42,0.9);
            border: 1px solid rgba(31,41,55,0.9);
            padding: 14px; margin-bottom: 14px;
            backdrop-filter: blur(20px);
        }
        .tab-content.active { display: block; }

        .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        input[type="text"], input[type="number"], select {
            width: 100%; padding: 10px; border-radius: 9px;
            border: 1px solid rgba(55,65,81,0.95);
            background-color: rgba(15,23,42,0.95); color: #e5e7eb; font-size: 14px;
            outline: none; -webkit-appearance: none;
        }

        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 12px; border-radius: 999px; border: none;
            cursor: pointer; font-weight: 600; font-size: 14px; gap: 6px;
        }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #10b981); color: white; width: 100%; }

        .player-card {
            border-radius: 16px; border: 1px solid rgba(55,65,81,0.9);
            background: rgba(15,23,42,0.95); padding: 16px;
        }

        .progress-bar-container {
            width: 100%; height: 6px; border-radius: 999px;
            background-color: rgba(31,41,55,0.9); margin: 15px 0; overflow: hidden;
        }
        .progress-bar { width: 0; height: 100%; background: #22c55e; }

        .player-controls { display: flex; align-items: center; justify-content: center; gap: 20px; }
        .btn-icon {
            width: 48px; height: 48px; border-radius: 50%;
            background-color: rgba(31,41,55,0.9); color: white; border: none; font-size: 20px;
        }

        .playlist-list {
            margin: 10px 0 0; padding: 0; list-style: none;
            max-height: 300px; overflow-y: auto; border-radius: 10px;
        }
        .file-item {
            padding: 12px; border-bottom: 1px solid rgba(31,41,55,0.9);
            display: flex; align-items: center; justify-content: space-between;
        }
        .file-item.active { background: rgba(59, 130, 246, 0.2); border-left: 3px solid #3b82f6; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-inner">
        <header>
            <div class="title-group">
                <div class="app-icon">﷽</div>
                <div>
                    <h1>Quran Player</h1>
                    <p class="subtitle">Verse-based repeat player</p>
                </div>
            </div>
        </header>

        <div class="tabs">
            <button class="tab active" data-tab="upload">Upload</button>
            <button class="tab" data-tab="playlist">Player</button>
            <button class="tab" data-tab="organization">Library</button>
        </div>

        <div class="tab-content active" id="uploadContent">
            <div class="grid">
                <div>
                    <input type="text" id="reciterName" placeholder="Reciter Name" style="margin-bottom: 10px;">
                    <input type="text" id="surahName" placeholder="Surah Name" style="margin-bottom: 10px;">
                    <input type="file" id="audioFiles" multiple style="margin-bottom: 10px; color: #9ca3af;">
                    <button id="uploadButton" class="btn btn-primary">Add to Library</button>
                </div>
            </div>
        </div>

        <div class="tab-content" id="playlistContent">
            <div class="grid" style="margin-bottom: 15px;">
                <select id="reciterSelect"><option value="">Select Reciter</option></select>
                <select id="surahSelect"><option value="">Select Surah</option></select>
            </div>
            <div class="grid" style="margin-bottom: 15px;">
                <input type="number" id="startVerse" value="1" placeholder="Start">
                <input type="number" id="endVerse" value="7" placeholder="End">
            </div>
            <div class="grid" style="margin-bottom: 15px;">
                <input type="number" id="verseRepeats" value="3" title="Verse Repeats">
                <button id="createPlaylistButton" class="btn btn-primary">Start Session</button>
            </div>

            <div class="player-card">
                <p id="nowPlayingTitle" style="text-align: center; font-weight: bold; margin: 0;">No track selected</p>
                <p id="playbackInfo" style="text-align: center; font-size: 12px; color: #9ca3af;">—</p>

                <div class="progress-bar-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>

                <div class="player-controls">
                    <button id="prevButton" class="btn-icon">⏮</button>
                    <button id="playButton" class="btn-icon" style="width: 60px; height: 60px; font-size: 24px;">▶</button>
                    <button id="nextButton" class="btn-icon">⏭</button>
                </div>
            </div>

            <ul id="playlistFiles" class="playlist-list"></ul>
        </div>

        <div class="tab-content" id="organizationContent">
            <div id="recitersList"></div>
            <button id="clearLibraryButton" class="btn" style="background: var(--danger-color); color: white; width: 100%; margin-top: 20px;">Clear All Data</button>
        </div>
    </div>
</div>

<script>
    // --- PERSISTENCE & GLOBAL STATE ---
    const appState = {
        library: { files: [], reciters: {}, surahs: {} },
        playlist: { files: [], currentIndex: 0, playlistRepeatCount: 0 },
        playback: {
            isPlaying: false,
            audio: new Audio(),
            currentVerseRepeat: 0,
            totalVerseRepeats: 3
        }
    };

    // Fix for iOS PWA: Keep audio object globally accessible to prevent garbage collection
    window._audioInstance = appState.playback.audio;

    let db;
    const DB_NAME = 'quran-player-v2';
    const FILE_STORE = 'files';

    // --- DB & LIBRARY LOGIC ---
    async function initDB() {
        return new Promise((resolve) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                db.createObjectStore(FILE_STORE, { keyPath: 'id' });
            };
            request.onsuccess = (e) => { db = e.target.result; resolve(); };
        });
    }

    async function loadLibrary() {
        const tx = db.transaction(FILE_STORE, 'readonly');
        const store = tx.objectStore(FILE_STORE);
        const records = await new Promise(r => store.getAll().onsuccess = (e) => r(e.target.result));

        appState.library.files = records.map(rec => ({
            ...rec,
            url: URL.createObjectURL(rec.blob) // Temporary URL
        }));

        updateDropdowns();
        renderLibrary();
    }

    // --- PLAYBACK ENGINE ---
    function playTrack(index) {
        if (!appState.playlist.files.length) return;

        // Boundaries
        if (index < 0 || index >= appState.playlist.files.length) {
            stopPlayback();
            return;
        }

        const file = appState.playlist.files[index];
        appState.playlist.currentIndex = index;

        // FIX: Always refresh the Blob URL before playing to prevent "Ghost Resume" in PWAs
        if (file.url) URL.revokeObjectURL(file.url);
        file.url = URL.createObjectURL(file.blob);

        appState.playback.audio.src = file.url;
        appState.playback.audio.load();

        appState.playback.audio.play().then(() => {
            appState.playback.isPlaying = true;
            document.getElementById('playButton').innerHTML = '⏸';
            updateMediaSession(file);
        }).catch(e => console.error("Playback Error:", e));

        appState.playback.currentVerseRepeat = 0;
        updateUI();
    }

    function togglePlay() {
        const audio = appState.playback.audio;
        if (appState.playback.isPlaying) {
            audio.pause();
            appState.playback.isPlaying = false;
            document.getElementById('playButton').innerHTML = '▶';
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "paused";
        } else {
            if (!audio.src) {
                playTrack(appState.playlist.currentIndex);
            } else {
                audio.play().then(() => {
                    appState.playback.isPlaying = true;
                    document.getElementById('playButton').innerHTML = '⏸';
                    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "playing";
                });
            }
        }
    }

    function updateMediaSession(file) {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: `${file.surah}: Verse ${file.verse}`,
                artist: file.reciter,
                album: 'Quran Player'
            });
            navigator.mediaSession.playbackState = "playing";
        }
    }

    // --- EVENT LISTENERS ---
    appState.playback.audio.addEventListener('ended', () => {
        if (appState.playback.currentVerseRepeat < appState.playback.totalVerseRepeats - 1) {
            appState.playback.currentVerseRepeat++;
            appState.playback.audio.currentTime = 0;
            appState.playback.audio.play();
            updateUI();
        } else {
            playTrack(appState.playlist.currentIndex + 1);
        }
    });

    appState.playback.audio.addEventListener('timeupdate', () => {
        const progress = (appState.playback.audio.currentTime / appState.playback.audio.duration) * 100;
        document.getElementById('progressBar').style.width = (progress || 0) + '%';
    });

    // Media Session Handlers (for Lock Screen Controls)
    if ('mediaSession' in navigator) {
        navigator.mediaSession.setActionHandler('play', togglePlay);
        navigator.mediaSession.setActionHandler('pause', togglePlay);
        navigator.mediaSession.setActionHandler('previoustrack', () => playTrack(appState.playlist.currentIndex - 1));
        navigator.mediaSession.setActionHandler('nexttrack', () => playTrack(appState.playlist.currentIndex + 1));
    }

    // --- UI RENDERING & TABS ---
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab, .tab-content').forEach(el => el.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(tab.dataset.tab + 'Content').classList.add('active');
        });
    });

    document.getElementById('uploadButton').onclick = async () => {
        const reciter = document.getElementById('reciterName').value;
        const surah = document.getElementById('surahName').value;
        const files = document.getElementById('audioFiles').files;

        if (!reciter || !surah || !files.length) return alert("Fill all fields");

        const tx = db.transaction(FILE_STORE, 'readwrite');
        for (let f of files) {
            const verse = parseInt(f.name.match(/\d+/)) || 0;
            const id = Date.now() + '-' + Math.random().toString(36).substr(2, 5);
            tx.objectStore(FILE_STORE).add({ id, reciter, surah, verse, blob: f, name: f.name });
        }
        await loadLibrary();
        alert("Files Added!");
    };

    document.getElementById('createPlaylistButton').onclick = () => {
        const r = document.getElementById('reciterSelect').value;
        const s = document.getElementById('surahSelect').value;
        const start = parseInt(document.getElementById('startVerse').value);
        const end = parseInt(document.getElementById('endVerse').value);
        appState.playback.totalVerseRepeats = parseInt(document.getElementById('verseRepeats').value);

        appState.playlist.files = appState.library.files.filter(f =>
            f.reciter === r && f.surah === s && f.verse >= start && f.verse <= end
        ).sort((a, b) => a.verse - b.verse);

        if (appState.playlist.files.length) playTrack(0);
        else alert("No verses found in range");
    };

    function updateDropdowns() {
        const reciters = [...new Set(appState.library.files.map(f => f.reciter))];
        const surahs = [...new Set(appState.library.files.map(f => f.surah))];

        const rSel = document.getElementById('reciterSelect');
        const sSel = document.getElementById('surahSelect');

        rSel.innerHTML = reciters.map(r => `<option value="${r}">${r}</option>`).join('');
        sSel.innerHTML = surahs.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    function updateUI() {
        const file = appState.playlist.files[appState.playlist.currentIndex];
        if (!file) return;
        document.getElementById('nowPlayingTitle').innerText = `${file.surah}: Verse ${file.verse}`;
        document.getElementById('playbackInfo').innerText = `Repeat ${appState.playback.currentVerseRepeat + 1} of ${appState.playback.totalVerseRepeats}`;

        const list = document.getElementById('playlistFiles');
        list.innerHTML = appState.playlist.files.map((f, i) => `
            <li class="file-item ${i === appState.playlist.currentIndex ? 'active' : ''}" onclick="playTrack(${i})">
                <span>${f.surah} - V${f.verse}</span>
                <span style="font-size: 10px; color: #9ca3af;">${f.reciter}</span>
            </li>
        `).join('');
    }

    function stopPlayback() {
        appState.playback.audio.pause();
        appState.playback.isPlaying = false;
        document.getElementById('playButton').innerHTML = '▶';
    }

    document.getElementById('playButton').onclick = togglePlay;
    document.getElementById('nextButton').onclick = () => playTrack(appState.playlist.currentIndex + 1);
    document.getElementById('prevButton').onclick = () => playTrack(appState.playlist.currentIndex - 1);

    initDB().then(loadLibrary);
</script>
</body>
</html>
