<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quranic Player Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
            --text: #f8fafc;
        }
        body { margin: 0; font-family: -apple-system, system-ui; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #334155; }
        .status-bar { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 20px; padding: 8px; background: #020617; border-radius: 10px; }
        .alive-dot { color: #10b981; }
        .tab-btn { padding: 10px; background: #334155; border: none; color: white; border-radius: 8px; cursor: pointer; }
        .tab-btn.active { background: var(--accent); }
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; margin-top: 5px; }
        .player-ui { text-align: center; margin-top: 20px; }
        .controls { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .btn-circle { width: 50px; height: 50px; border-radius: 50%; border: none; background: var(--accent); color: white; font-size: 20px; }
        .progress-container { width: 100%; height: 6px; background: #334155; border-radius: 3px; margin: 20px 0; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent); }
        .playlist { list-style: none; padding: 0; max-height: 200px; overflow-y: auto; text-align: left; }
        .playlist-item { padding: 10px; border-bottom: 1px solid #334155; font-size: 13px; }
        .playlist-item.active { border-left: 3px solid var(--accent); background: #1e293b; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="status-bar">
        <span>SYSTEM: <span id="sysStatus">IDLE</span></span>
        <span>SHIELD: <span id="shieldStatus" class="alive-dot">● ACTIVE</span></span>
    </div>

    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button id="tabUpload" class="tab-btn active">Upload</button>
        <button id="tabPlay" class="tab-btn">Player</button>
    </div>

    <div id="uploadSec">
        <div class="form-group">
            <label>Reciter & Surah</label>
            <input type="text" id="recName" placeholder="Reciter Name">
            <input type="text" id="surName" placeholder="Surah Name">
        </div>
        <div class="form-group">
            <input type="file" id="audioFiles" multiple accept="audio/*">
        </div>
        <button id="saveBtn" style="width:100%; padding:15px; background:#10b981; border:none; color:white; border-radius:10px;">ADD TO LIBRARY</button>
        <button id="clearBtn" style="margin-top:20px; color:#ef4444; background:none; border:none; font-size:12px;">Clear All Data</button>
    </div>

    <div id="playerSec" class="hidden">
        <div class="form-group">
            <label>Verse Range & Repeats</label>
            <div style="display:flex; gap:5px;">
                <input type="number" id="vStart" value="1" placeholder="Start">
                <input type="number" id="vEnd" value="7" placeholder="End">
            </div>
            <label>Repeat each verse:</label>
            <input type="number" id="vRpt" value="3">
        </div>
        <button id="loadPlay" style="width:100%; padding:10px; background:var(--accent); border:none; color:white; border-radius:10px;">START PLAYLIST</button>

        <div class="player-ui">
            <h3 id="curTrack">No Track</h3>
            <p id="curInfo" style="font-size:12px; color:#94a3b8;">—</p>
            <div class="progress-container"><div id="prog" class="progress-fill"></div></div>
            <div class="controls">
                <button class="btn-circle" id="btnPrev">⏮</button>
                <button class="btn-circle" id="btnPlay" style="width:70px; height:70px; font-size:30px;">▶</button>
                <button class="btn-circle" id="btnNext">⏭</button>
            </div>
        </div>
        <ul id="listUI" class="playlist"></ul>
    </div>
</div>

<script>
    // 1. THE ULTIMATE iOS SURVIVAL TRICK: AUDIO MERGING
    // We play a silent loop AND we update the MediaSession playback state every 5 seconds.
    const SILENCE = "data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAP8A/wD/";
    const shield = new Audio(SILENCE);
    shield.loop = true;

    const app = {
        db: null,
        library: [],
        playlist: [],
        idx: 0,
        rptCount: 0,
        audio: new Audio(),
        isPlaying: false
    };

    // 2. DATABASE (Fresh Start)
    const initDB = () => {
        return new Promise(res => {
            const req = indexedDB.open('QuranFinalDB', 2);
            req.onupgradeneeded = e => e.target.result.createObjectStore('files', { keyPath: 'id' });
            req.onsuccess = e => { app.db = e.target.result; res(); };
        });
    };

    // 3. STORAGE & UPLOAD
    document.getElementById('saveBtn').onclick = async () => {
        const files = document.getElementById('audioFiles').files;
        const rec = document.getElementById('recName').value;
        const sur = document.getElementById('surName').value;
        if(!files.length || !rec) return alert("Fill fields");

        for(let f of files) {
            const reader = new FileReader();
            reader.readAsDataURL(f);
            reader.onload = () => {
                const item = {
                    id: Date.now() + Math.random().toString(36).substr(2,5),
                    rec, sur, name: f.name,
                    verse: parseInt(f.name.match(/\d+/) || 0),
                    data: reader.result
                };
                const tx = app.db.transaction('files', 'readwrite');
                tx.objectStore('files').put(item);
            };
        }
        alert("Saved! Refreshing...");
        setTimeout(() => location.reload(), 1000);
    };

    // 4. CORE ENGINE
    const loadLib = async () => {
        const tx = app.db.transaction('files', 'readonly');
        tx.objectStore('files').getAll().onsuccess = e => {
            app.library = e.target.result;
        };
    };

    const playTrack = (i) => {
        if (i < 0 || i >= app.playlist.length) return;
        app.idx = i;
        const track = app.playlist[i];

        // Engage iOS Shield
        shield.play().catch(()=>{});

        app.audio.src = track.data;
        app.audio.play();
        app.isPlaying = true;
        document.getElementById('btnPlay').innerText = "⏸";
        document.getElementById('curTrack').innerText = `${track.sur} - v${track.verse}`;
        updateUI();

        // Update Media Session (Lock Screen)
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: `${track.sur} - Verse ${track.verse}`,
                artist: track.rec
            });
            navigator.mediaSession.playbackState = "playing";
        }
    };

    app.audio.onended = () => {
        const limit = parseInt(document.getElementById('vRpt').value) || 1;
        if(app.rptCount < limit - 1) {
            app.rptCount++;
            app.audio.currentTime = 0;
            app.audio.play();
        } else {
            app.rptCount = 0;
            playTrack(app.idx + 1);
        }
        updateUI();
    };

    // 5. UI & TABS
    const updateUI = () => {
        document.getElementById('curInfo').innerText = `Repeat ${app.rptCount + 1}`;
        document.getElementById('sysStatus').innerText = app.isPlaying ? "PLAYING" : "PAUSED";
        const list = document.getElementById('listUI');
        list.innerHTML = app.playlist.map((t, i) => `
            <li class="playlist-item ${i===app.idx?'active':''}">Verse ${t.verse} (${t.rec})</li>
        `).join('');
    };

    document.getElementById('loadPlay').onclick = () => {
        const s = parseInt(document.getElementById('vStart').value);
        const e = parseInt(document.getElementById('vEnd').value);
        app.playlist = app.library.filter(f => f.verse >= s && f.verse <= e).sort((a,b)=>a.verse-b.verse);
        playTrack(0);
    };

    document.getElementById('tabUpload').onclick = () => {
        document.getElementById('uploadSec').classList.remove('hidden');
        document.getElementById('playerSec').classList.add('hidden');
        document.getElementById('tabUpload').classList.add('active');
        document.getElementById('tabPlay').classList.remove('active');
    };

    document.getElementById('tabPlay').onclick = () => {
        document.getElementById('playerSec').classList.remove('hidden');
        document.getElementById('uploadSec').classList.add('hidden');
        document.getElementById('tabPlay').classList.add('active');
        document.getElementById('tabUpload').classList.remove('active');
    };

    document.getElementById('btnPlay').onclick = () => {
        if(app.isPlaying) { app.audio.pause(); app.isPlaying = false; document.getElementById('btnPlay').innerText = "▶"; }
        else { app.audio.play(); app.isPlaying = true; document.getElementById('btnPlay').innerText = "⏸"; }
    };

    document.getElementById('btnNext').onclick = () => playTrack(app.idx + 1);
    document.getElementById('btnPrev').onclick = () => playTrack(app.idx - 1);

    app.audio.ontimeupdate = () => {
        document.getElementById('prog').style.width = (app.audio.currentTime / app.audio.duration * 100) + "%";
    };

    document.getElementById('clearBtn').onclick = () => {
        indexedDB.deleteDatabase('QuranFinalDB');
        location.reload();
    };

    // Initialize
    initDB().then(loadLib);
</script>

</body>
</html>
