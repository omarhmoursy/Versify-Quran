<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quranic Recitation Player</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Quran Player">
    <style>
        :root {
            --primary-color: #1d3557;
            --secondary-color: #457b9d;
            --accent-color: #a8dadc;
            --background-color: #f1faee;
            --surface-color: #ffffff;
            --danger-color: #e63946;
            --muted-color: #6c757d;
            --text-color: #1f2933;
            --border-radius: 12px;
            --shadow-soft: 0 10px 30px rgba(15, 23, 42, 0.15);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, -webkit-system-font, sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.15) 0, transparent 40%), radial-gradient(circle at 80% 80%, rgba(16, 185, 129, 0.12) 0, transparent 45%);
            color: #e5e7eb;
            min-height: 100vh;
            padding: 16px;
        }

        .app-container {
            max-width: 980px;
            margin: 0 auto;
            background: radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 55%), #020617;
            border-radius: 24px;
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(148,163,184,0.25);
            padding: 18px;
            position: relative;
            overflow: hidden;
        }

        .app-inner { position: relative; z-index: 1; }

        header {
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(148,163,184,0.35);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .title-group { display: flex; align-items: center; gap: 10px; }

        .app-icon {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: radial-gradient(circle at 30% 30%, #22c55e, #065f46);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ecfdf5;
            font-size: 20px;
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.5);
            border: 1px solid rgba(16, 185, 129, 0.4);
        }

        h1 { font-size: 20px; margin: 0; color: #e5e7eb; letter-spacing: 0.02em; }
        .subtitle { margin: 2px 0 0; font-size: 12px; color: #9ca3af; }

        .badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 9px; border-radius: 999px;
            background-color: rgba(15,23,42,0.8);
            border: 1px solid rgba(148,163,184,0.6);
            color: #e5e7eb; font-size: 11px; white-space: nowrap;
        }
        .badge-dot { width: 6px; height: 6px; border-radius: 999px; background-color: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.35); }

        .tabs {
            display: flex; margin-bottom: 16px; padding: 3px;
            background-color: rgba(15,23,42,0.9);
            border-radius: 999px; border: 1px solid rgba(31,41,55,0.9);
        }

        .tab {
            flex: 1; padding: 8px 10px; text-align: center; border-radius: 999px;
            cursor: pointer; font-size: 13px; font-weight: 500; color: #9ca3af;
            border: none; background: transparent;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            transition: all 0.17s ease;
        }
        .tab.active {
            background: radial-gradient(circle at 20% 0, rgba(59,130,246,0.45), rgba(37,99,235,0.95));
            color: #f9fafb;
            box-shadow: 0 7px 18px rgba(37,99,235,0.55);
        }

        .tab-content {
            display: none; border-radius: 18px;
            background-color: rgba(15,23,42,0.9);
            border: 1px solid rgba(31,41,55,0.9);
            padding: 14px; margin-bottom: 14px;
            backdrop-filter: blur(20px);
        }
        .tab-content.active { display: block; }

        .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        .form-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 4px; font-size: 11px; color: #9ca3af; font-weight: 500; text-transform: uppercase; }

        input[type="text"], input[type="number"], select {
            width: 100%; padding: 7px 9px; border-radius: 9px;
            border: 1px solid rgba(55,65,81,0.95);
            background-color: rgba(15,23,42,0.95); color: #e5e7eb; font-size: 13px;
        }

        .file-input-label {
            display: block; padding: 12px; background-color: var(--secondary-color);
            color: white; border-radius: 6px; text-align: center; cursor: pointer;
        }

        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 8px 12px; border-radius: 999px; border: none;
            cursor: pointer; font-weight: 500; font-size: 13px; gap: 6px;
        }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #10b981); color: white; }
        .btn-icon {
            width: 40px; height: 40px; border-radius: 999px;
            background-color: rgba(15,23,42,0.95);
            border: 1px solid rgba(55,65,81,0.9);
            color: #e5e7eb; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .progress-bar-container {
            width: 100%; height: 6px; border-radius: 999px;
            background-color: rgba(31,41,55,0.9); margin: 12px 0; overflow: hidden;
        }
        .progress-bar { width: 0; height: 100%; background: linear-gradient(90deg, #22c55e, #eab308); }

        .playlist-list {
            margin: 4px 0 0; padding: 0; list-style: none; overflow-y: auto;
            max-height: 300px; border-radius: 10px; border: 1px solid rgba(31,41,55,0.9);
        }
        .file-item {
            padding: 10px; border-bottom: 1px solid rgba(31,41,55,0.9); cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }
        .file-item.active { background: rgba(59, 130, 246, 0.2); border-left: 3px solid #22c55e; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-inner">
        <header>
            <div class="title-group">
                <div class="app-icon">﷽</div>
                <div>
                    <h1>Quran Player</h1>
                    <p class="subtitle">Verse-based repeat player</p>
                </div>
            </div>
            <div class="badge"><span class="badge-dot"></span><span>Background Ready</span></div>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="showTab('uploadContent')">Upload</button>
            <button class="tab" onclick="showTab('playlistContent')">Player</button>
        </div>

        <div class="tab-content active" id="uploadContent">
            <div class="grid">
                <div class="form-group">
                    <label>Reciter</label>
                    <input type="text" id="reciterName" placeholder="Al-Afasy">
                </div>
                <div class="form-group">
                    <label>Surah</label>
                    <input type="text" id="surahName" placeholder="Al-Fatihah">
                </div>
            </div>
            <label class="file-input-label">
                Select Verse Audio Files
                <input type="file" id="audioFiles" multiple style="display:none" onchange="handleFiles(this.files)">
            </label>
            <div id="fileListPreview" style="font-size:12px; margin-top:10px; color:#9ca3af;"></div>
            <button onclick="saveToLibrary()" class="btn btn-primary" style="margin-top:15px; width:100%;">Add to Library</button>
        </div>

        <div class="tab-content" id="playlistContent">
            <div class="grid">
                <div class="form-group">
                    <label>Verse Repeats</label>
                    <input type="number" id="verseRepeats" value="3" min="1">
                </div>
                <div class="form-group">
                    <label>Playlist Repeats</label>
                    <input type="number" id="playlistRepeats" value="1" min="1">
                </div>
            </div>

            <div style="background: rgba(15,23,42,0.6); padding: 15px; border-radius: 15px; margin-top: 10px;">
                <p id="nowPlayingTitle" style="margin:0; font-weight:bold;">No track loaded</p>
                <p id="playbackStatus" style="font-size:12px; color:#9ca3af; margin:5px 0;">Standing by...</p>
                <div class="progress-bar-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
                <div style="display:flex; justify-content: center; gap: 15px;">
                    <button class="btn-icon" onclick="playPrev()">⏮</button>
                    <button id="playBtn" class="btn-icon" style="width:50px; height:50px; font-size:20px;" onclick="togglePlay()">▶</button>
                    <button class="btn-icon" onclick="playNext()">⏭</button>
                </div>
            </div>

            <ul id="playlistFiles" class="playlist-list" style="margin-top:15px;"></ul>
        </div>
    </div>
</div>

<script>
    // --- STATE MANAGEMENT ---
    const appState = {
        library: [],
        playlist: [],
        currentIndex: 0,
        isPlaying: false,
        verseRepeatCount: 0,
        playlistCycleCount: 0,
        audio: new Audio()
    };

    // --- DATABASE (IndexedDB) ---
    let db;
    const request = indexedDB.open("QuranPlayerDB", 1);
    request.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("files", { keyPath: "id", autoIncrement: true });
    };
    request.onsuccess = e => {
        db = e.target.result;
        loadFromDB();
    };

    function loadFromDB() {
        const transaction = db.transaction("files", "readonly");
        const store = transaction.objectStore("files");
        store.getAll().onsuccess = e => {
            appState.library = e.target.result;
            refreshPlaylistUI();
        };
    }

    // --- FILE HANDLING ---
    let pendingFiles = [];
    function handleFiles(files) {
        pendingFiles = Array.from(files);
        document.getElementById('fileListPreview').innerText = `${files.length} files selected.`;
    }

    async function saveToLibrary() {
        const reciter = document.getElementById('reciterName').value || "Unknown";
        const surah = document.getElementById('surahName').value || "Unknown";

        const transaction = db.transaction("files", "readwrite");
        const store = transaction.objectStore("files");

        for (const file of pendingFiles) {
            // Extract verse number from filename (e.g., 001.mp3 -> 1)
            const verseNum = file.name.replace(/\D/g, "");
            await store.add({
                reciter,
                surah,
                verse: verseNum,
                name: file.name,
                data: file // Storing the Blob
            });
        }
        loadFromDB();
        alert("Files saved to local library!");
    }

    // --- PLAYER LOGIC ---
    function refreshPlaylistUI() {
        const list = document.getElementById('playlistFiles');
        list.innerHTML = "";
        appState.playlist = [...appState.library]; // Simplification: play all for now

        appState.playlist.forEach((item, index) => {
            const li = document.createElement('li');
            li.className = `file-item ${index === appState.currentIndex ? 'active' : ''}`;
            li.innerHTML = `<div><b>${item.surah}</b> - Verse ${item.verse}</div><small>${item.reciter}</small>`;
            li.onclick = () => playTrack(index);
            list.appendChild(li);
        });
    }

    async function playTrack(index) {
        if (index < 0 || index >= appState.playlist.length) return;

        appState.currentIndex = index;
        const track = appState.playlist[index];

        // Convert Blob to URL
        if (appState.audio.src) URL.revokeObjectURL(appState.audio.src);
        appState.audio.src = URL.createObjectURL(track.data);

        document.getElementById('nowPlayingTitle').innerText = `${track.surah} - Verse ${track.verse}`;
        refreshPlaylistUI();

        startPlayback();
        updateMediaSession(track);
    }

    async function startPlayback() {
        try {
            await appState.audio.play();
            appState.isPlaying = true;
            document.getElementById('playBtn').innerText = "⏸";
        } catch (err) {
            console.error("Playback failed", err);
        }
    }

    function togglePlay() {
        if (appState.isPlaying) {
            appState.audio.pause();
            appState.isPlaying = false;
            document.getElementById('playBtn').innerText = "▶";
        } else {
            // Re-sync source if it was lost in background
            if (appState.audio.readyState === 0 && appState.playlist.length > 0) {
                playTrack(appState.currentIndex);
            } else {
                startPlayback();
            }
        }
    }

    // --- BACKGROUND AUDIO (The Magic Fix) ---
    function updateMediaSession(track) {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: `Verse ${track.verse}`,
                artist: track.reciter,
                album: track.surah
            });

            navigator.mediaSession.setActionHandler('play', () => togglePlay());
            navigator.mediaSession.setActionHandler('pause', () => togglePlay());
            navigator.mediaSession.setActionHandler('previoustrack', () => playPrev());
            navigator.mediaSession.setActionHandler('nexttrack', () => playNext());
        }
    }

    // --- LOOPING & PROGRESS LOGIC ---
    appState.audio.onended = () => {
        const vRepeats = parseInt(document.getElementById('verseRepeats').value) || 1;
        const pRepeats = parseInt(document.getElementById('playlistRepeats').value) || 1;

        appState.verseRepeatCount++;

        if (appState.verseRepeatCount < vRepeats) {
            // Repeat current verse
            appState.audio.currentTime = 0;
            startPlayback();
        } else {
            // Move to next verse
            appState.verseRepeatCount = 0;
            if (appState.currentIndex < appState.playlist.length - 1) {
                playNext();
            } else {
                // End of playlist reached
                appState.playlistCycleCount++;
                if (appState.playlistCycleCount < pRepeats) {
                    playTrack(0);
                } else {
                    appState.isPlaying = false;
                    document.getElementById('playBtn').innerText = "▶";
                }
            }
        }
    };

    appState.audio.ontimeupdate = () => {
        const progress = (appState.audio.currentTime / appState.audio.duration) * 100;
        document.getElementById('progressBar').style.width = `${progress}%`;

        const current = Math.floor(appState.audio.currentTime);
        const total = Math.floor(appState.audio.duration || 0);
        document.getElementById('playbackStatus').innerText = `Repeat ${appState.verseRepeatCount + 1} | ${current}s / ${total}s`;
    };

    function playNext() {
        appState.verseRepeatCount = 0;
        playTrack((appState.currentIndex + 1) % appState.playlist.length);
    }

    function playPrev() {
        appState.verseRepeatCount = 0;
        playTrack((appState.currentIndex - 1 + appState.playlist.length) % appState.playlist.length);
    }

    // --- UI HELPERS ---
    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }
</script>

</body>
</html>
